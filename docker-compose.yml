services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: always

  frontend:
    build:
      context: ./frontend_new
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: always
